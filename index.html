<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form application</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <h1>form to apply a entrance exam</h1>
    <form action="post">
        <div></div>
        <label for="username">your username </label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>
        <div>
            <label for="date">your date of birth </label>
            <input type="date" id="date" name="date">
        </div>
        <div>
            <input type="radio" id="Transgender" name="gender" value="Transgender">
            <label for="Transgender">Transgender</label>
            <input type="radio" name="gender" id="Male" value="Male">
            <label for="Male">Male</label>
            <input type="radio" name="gender" id="Female" value="Female">
            <label for="Female">Female</label>
        </div>

        <div>
            <label for="number">Your phone number</label>
            <input type="number" size="10" id="phone" name="number" placeholder="Enter your phone number">
        </div>

        <div>
            <label for="address">Your address</label>
            <input type="address" id="address" name="address" placeholder=" Enter your address">
        </div>

        <div>
            <label for="Email"> Your email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
        </div>
        <div>
            <label for="Country">Your country </label>
            <input type="text" required id="Country" name="country" placeholder="Enter your country">
        </div>
        <div>

            <label for="Photo">Your photo</label>
            <input type="file" id="Photo" name="photo">
        </div>
        <div>
            <label for="subjects">Your subjects</label>
            <select name="subjects" id="subjects">
                <option value="scroll down"> None</option>
                <option value="Maths">Maths</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="Computer Science">Computer Science</option>

        </div>
        <div>
            <label for="checkbox">I agree to the terms and conditions</label>
            <input type="checkbox" id="checkbox" name="checkbox">
        </div>
        <div>
            <input type="submit" id="submit" name="submit">
        </div>








        </div>

    </form>

</body>

</html>
